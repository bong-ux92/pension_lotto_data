name: Update Lottery Numbers

on:
  schedule:
    # 한국 시간(KST) 매주 목요일 오후 8시 00분에 실행 (UTC 11:00)
    - cron: '0 11 * * 4' 
  workflow_dispatch: # 지금 바로 수동으로 실행해볼 수 있는 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      - name: Run scraper
        run: python scraper.py
      - name: Commit and Push
        run: |
          git config --global user.name "Lottery Bot"
          git config --global user.email "bot@github.com"
          git add latest_win.json
          git commit -m "Update latest lottery numbers" || exit 0
          git push
